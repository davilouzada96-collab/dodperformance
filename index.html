<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Biblioteca Científica DOD</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <a class="brand" href="#cards" aria-label="DOD Performance">
          <span class="brand-mark">D</span>
          <span>
            <strong>DOD</strong>
            <small>PERFORMANCE</small>
          </span>
        </a>
        <nav class="site-nav" aria-label="Navegação principal">
          <a class="is-active" href="#cards">Cards</a>
        </nav>
      </div>
    </header>
    <main class="app-shell">
      <section class="hero">
        <p class="eyebrow">CARDS</p>
        <h1>Biblioteca científica DOD</h1>
        <p class="hero-copy">DOD Based Learning</p>
      </section>
      <section class="search-panel" aria-label="Busca científica">
        <form class="research-form" id="researchForm">
          <label class="field field-wide">
            <span>Tema científico</span>
            <input
              id="topicInput"
              type="search"
              placeholder="Buscar por tema, protocolo ou referência"
              autocomplete="off"
            />
          </label>
          <button class="primary-button" type="submit" id="searchButton">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m21 21-4.3-4.3M10.8 18a7.2 7.2 0 1 1 0-14.4 7.2 7.2 0 0 1 0 14.4Z" />
            </svg>
            Buscar
          </button>
        </form>
        <div class="chip-row" aria-label="Temas rápidos">
          <button class="filter-chip is-active" type="button" data-topic="">Tudo</button>
          <button class="filter-chip" type="button" data-topic="cefaleia, emergência, tontura, vertigem, equilíbrio e sepse" data-query-topic="(headache emergency) OR (dizziness vertigo balance) OR (sepsis acute respiratory failure) OR (neurological assessment risk stratification)">Neuro</button>
          <button class="filter-chip" type="button" data-topic="dor, inflamação, recuperação muscular, tendão e reabilitação" data-query-topic="(pain inflammation recovery) OR (muscle injury rehabilitation) OR (tendon load adaptation)">Physio</button>
          <button class="filter-chip" type="button" data-topic="força, potência, fadiga, carga de treino e performance esportiva" data-query-topic="(muscle strength power) OR (fatigue sports performance) OR (training load recovery)">Sport</button>
          <button class="filter-chip" type="button" data-topic="variabilidade da frequência cardíaca, sono, estresse e recuperação" data-query-topic="(heart rate variability recovery) OR (sleep circadian rhythm performance) OR (stress cortisol autonomic nervous system)">Homeostase</button>
        </div>
        <p class="run-status" id="runStatus">Preparando biblioteca científica...</p>
      </section>
      <section class="cards-grid" id="cards" aria-live="polite"></section>
      <p class="empty-state" id="emptyState" hidden>Nenhum artigo bateu com os filtros atuais.</p>
      <section class="engine-hidden" aria-hidden="true">
        <select id="sourceSelect"><option value="both" selected>OpenAlex + PubMed</option></select>
        <input id="fromYearInput" type="number" value="2020" />
        <select id="resultLimit"><option value="50" selected>50</option></select>
        <button type="button" id="loadLocalButton"></button>
        <button type="button" id="copyStrategyButton"></button>
        <button type="button" id="exportJsonButton"></button>
        <button type="button" id="exportCsvButton"></button>
        <button type="button" id="exportVancouverButton"></button>
        <button type="button" id="exportMarkdownButton"></button>
        <button type="button" id="inferPicoButton"></button>
        <button type="button" id="applyPicoButton"></button>
        <input id="picoPopulation" type="text" />
        <input id="picoIntervention" type="text" />
        <input id="picoComparator" type="text" />
        <input id="picoOutcome" type="text" />
        <input id="projectNameInput" type="text" />
        <button type="button" id="saveProjectButton"></button>
        <select id="projectSelect"><option value="">Projetos salvos</option></select>
        <button type="button" id="loadProjectButton"></button>
        <button type="button" id="deleteProjectButton"></button>
        <input id="searchInput" type="search" />
        <select id="yearSelect"><option value="all">Todos</option></select>
        <select id="sortSelect"><option value="score-desc">Score brutal</option></select>
        <input id="minCitations" type="number" value="0" />
        <input id="cleanSources" type="checkbox" />
        <input id="strictEvidence" type="checkbox" />
        <div id="stats"></div>
        <span id="visibleCount"></span>
        <span id="topScore"></span>
        <span id="cleanRatio"></span>
        <button type="button" id="synthesisButton"></button>
        <div id="synthesisGrid"></div>
      </section>
    </main>
    <template id="cardTemplate">
      <article class="paper-card">
        <div class="card-visual">
          <span class="card-code"></span>
        </div>
        <div class="tag-row">
          <span class="evidence-pill"></span>
          <span class="source-pill"></span>
          <span class="oa-pill"></span>
        </div>
        <h2></h2>
        <p class="abstract"></p>
        <p class="journal"></p>
        <div class="card-actions">
          <a class="source-link" target="_blank" rel="noopener noreferrer">fonte científica</a>
          <button class="read-button" type="button">ler</button>
        </div>
      </article>
    </template>
    <div class="reader-modal" id="readerModal" role="dialog" aria-modal="true" aria-labelledby="readerTitle" hidden>
      <div class="reader-backdrop" id="readerBackdrop"></div>
      <article class="reader-panel">
        <header class="reader-head">
          <div>
            <p class="eyebrow">LEITURA</p>
            <h2 id="readerTitle"></h2>
            <p class="reader-original-title" id="readerOriginalTitle"></p>
          </div>
          <button class="reader-close" type="button" id="readerClose" aria-label="Fechar leitura">×</button>
        </header>
        <div class="reader-tags" id="readerTags"></div>
        <section class="reader-section">
          <h3>Leitura em português</h3>
          <p id="readerAbstract"></p>
        </section>
        <section class="reader-grid">
          <div>
            <h3>Fonte</h3>
            <p id="readerSource"></p>
          </div>
          <div>
            <h3>Rastreio</h3>
            <p id="readerTrace"></p>
          </div>
        </section>
        <section class="reader-section">
          <h3>Autores</h3>
          <p id="readerAuthors"></p>
        </section>
        <footer class="reader-actions">
          <a class="source-link" id="readerSourceLink" target="_blank" rel="noopener noreferrer">abrir fonte confiável</a>
          <button class="read-button" type="button" id="readerCopy">copiar referência</button>
        </footer>
      </article>
    </div>
    <script src="./app.js"></script>
  </body>
</html>
