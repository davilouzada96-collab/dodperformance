name: Deploy Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare public directory
        run: |
          rm -rf public
          mkdir -p public
          cp -R biblioteca/. public/
          cp -R ai-ecg-risco-cardioembolico public/
          cp -R assets public/
          cp _headers public/

      - name: Verify public directory
        run: |
          test -f public/index.html
          test -f public/app.js
          test -f public/styles.css
          test -f public/ai-ecg-risco-cardioembolico/index.html
          test -f public/assets/css/reset.css
          test -f public/_headers

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 05ef119cae7ef4dc98ff6f50bb6becc5
          command: pages deploy public --project-name=dodperformance --branch=main
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
