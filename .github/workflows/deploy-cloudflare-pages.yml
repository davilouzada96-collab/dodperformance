name: Deploy Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare public directory
        run: |
          rm -rf public
          mkdir -p public
          cp index.html public/
          cp app.js styles.css favicon.svg output_data_1779051008.json public/
          cp -R dodperoformance.main public/

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 05ef119cae7ef4dc98ff6f50bb6becc5
          command: pages deploy public --project-name=dodperformance --branch=main
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
