name: Deploy Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare public directory
        run: sh ./scripts/prepare-public.sh

      - name: Verify architecture and public package
        run: |
          node --check app.js
          node --check clinico/app.js
          node --check clinical-taxonomy.js
          node --check paper-contract.js
          node --check dodperoformance.main/ECG/ecg-signal.js
          node --check dodperoformance.main/ECG/workbench.js
          node scripts/verify-architecture.mjs --public

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 05ef119cae7ef4dc98ff6f50bb6becc5
          command: pages deploy public --project-name=dodperformance --branch=main
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
